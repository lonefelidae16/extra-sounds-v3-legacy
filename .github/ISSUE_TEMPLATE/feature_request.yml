name: Feature request
description: Suggest an idea for this project
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        **Please read if you wish to raise a version compatibility issue**
        This project is constantly being updated for new Minecraft compatibility, including snapshot versions.
        Please make sure that the target version does not exist in GitHub tags and Maven.
        Also, the artifacts generated by GitHub actions may still be available.
        If you wish to play on a newer version, a compatible snapshot version may exist. In some cases, it may work even if the target is an Alpha, Beta, or RC build.
        Please search from the link below:
        GitHub tags: https://github.com/lonefelidae16/extra-sounds/tags
        Maven: https://artifactory.kow08absty.com/ui/repos/tree/General/fabricmc/dev/stashy/extra-sounds
        GitHub actions: https://github.com/lonefelidae16/extra-sounds/actions

        Thanks for understanding.

  - type: textarea
    attributes:
      label: Describe your suggestion
    validations:
      required: true

  - type: textarea
    attributes:
      label: Additional context
      description: Add any other context or screenshots about the feature request here!
    validations:
      required: false
